{% extends "base.html" %}
{% load static %}

{% block title %}Login | Marvel{% endblock %}

{% block content %}
<div class="container">
    <div class="glass form-container" style="max-width: 450px;">
        <h1 class="marvel-font" style="font-size: 3rem; margin-bottom: 2rem; color: var(--marvel-red);">Login</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Authorized Personnel Only. Identify yourself, Hero.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Hero Identity</label>
                <input type="text" name="username" id="username" class="form-input" placeholder="Hero Name / Email" required>
            </div>
            <div class="form-group">
                <label for="password">Encryption Key</label>
                <input type="password" name="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <a href="{% url 'password' %}" style="display: block; text-align: right; margin-bottom: 1rem; color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Recall Password?</a>
            
            <button type="submit" class="btn-marvel">Access Records</button>
        </form>

        <p style="margin-top: 2rem; text-align: center; color: var(--text-muted);">
            New Hero? <a href="{% url 'register' %}" style="color: var(--marvel-red); text-decoration: none;">Join the Initiative</a>
        </p>
    </div>
</div>
{% endblock %}
